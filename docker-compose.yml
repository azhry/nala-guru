services:
  mongodb:
    image: mongo:7
    container_name: baby-math-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: baby-math-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/baby-math
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DASHBOARD_PIN=${DASHBOARD_PIN:-0000}
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
